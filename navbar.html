<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RipNotice.lk - Memorial Platform</title>
    <link rel="icon" href="assets/fav1.ico" type="image/x-icon">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ========== MAIN HEADER ========== -->
    <header class="main-header" id="navbar">
        <!-- ========== TOP UTILITY BAR ========== -->
        <div class="top-bar">
            <div class="top-bar-inner">
                <nav class="top-nav-links">
                    <a href="#" onclick="showMainPage(); return false;">Home</a>
                    <a href="about.html">About Us</a>
                    <a href="service.html">Services</a>
                    <a href="contact.html">Contact Us</a>
                     <!-- Other Webs dropdown -->
                    <div class="other-webs-wrap">
                        <button class="other-webs-btn" id="otherWebsBtn">
                            Other Webs <i class="bi bi-chevron-down"></i>
                        </button>
                        <div class="other-webs-dropdown" id="otherWebsMenu">
                            <a href="https://funeralnotice.lk" target="_blank" class="other-webs-item">FuneralNotice</a>
                            <a href="https://funeralnews.lk"   target="_blank" class="other-webs-item">FuneralNews</a>
                            <a href="https://digitalnotice.lk" target="_blank" class="other-webs-item">DigitalNotice</a>
                            <a href="https://ripnews.lk"       target="_blank" class="other-webs-item">RipNews</a>
                        </div>
                    </div>
                </nav>
                <div class="lang-wrap">
                    <button class="lang-btn" id="langBtn">
                        <i class="bi bi-globe"></i>
                        <span id="langLabel">English</span>
                        <i class="bi bi-chevron-down"></i>
                    </button>
                    <div class="lang-dropdown" id="langMenu">
                        <div class="lang-item active" data-lang="en" data-label="English">English</div>
                        <div class="lang-item" data-lang="ta" data-label="Tamil">Tamil</div>
                        <div class="lang-item" data-lang="si" data-label="Sinhala">Sinhala</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="header-inner">
            <div class="logo-wrap" onclick="showMainPage()">
                <img src="assets/logo.png" alt="RipNotice.lk">
            </div>
            <div class="header-divider"></div>
            <div class="search-wrap">
                <i class="bi bi-search search-icon"></i>
                <input type="search" class="search-input" id="searchInput" placeholder="Search a person…">
            </div>
            <button class="btn-create d-none d-lg-flex" data-bs-toggle="modal" data-bs-target="#createMemorialModal">
                <i class="bi bi-plus-circle"></i> Create Notice
            </button>
            <button class="btn-create d-flex d-lg-none" style="font-size:0.72rem;padding:7px 14px;" data-bs-toggle="modal" data-bs-target="#createMemorialModal">
                <i class="bi bi-plus-circle"></i> Create
            </button>
        </div>
    </header>

    <script src="js/script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</body>
</html>
